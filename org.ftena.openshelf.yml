Categories:
  - Reading
License: GPL-3.0-only
SourceCode: https://github.com/Swappppy/Openshelf
IssueTracker: https://github.com/Swappppy/Openshelf/issues
Translation: https://hosted.weblate.org/projects/openshelf/

AutoName: Openshelf

RepoType: git
Repo: https://github.com/Swappppy/Openshelf

Builds:
  - versionName: 1.0.0
    versionCode: 2001
    commit: 0a246fe283b24b4fa13068d6f0208b828d51a88d
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
    scandelete:
      - .pub-cache
    build:
      - git clone https://github.com/adaptech-cz/Tesseract4Android.git --branch 4.9.0 --depth 1 /tmp/ta
      - cd /tmp/ta && ./gradlew :tesseract4android:assembleRelease --no-daemon
      - export PUB_CACHE=$(pwd)/.pub-cache
      - mkdir -p $PUB_CACHE/hosted/pub.dev/flutter_tesseract_ocr-0.4.31/android/libs/
      - cp /tmp/ta/tesseract4android/build/outputs/aar/tesseract4android-release.aar $PUB_CACHE/hosted/pub.dev/flutter_tesseract_ocr-0.4.31/android/libs/
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-arm64"

AutoUpdateMode: Version
UpdateCheckMode: Tags
VercodeOperation:
  - '%c + 2000'
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.0.0
CurrentVersionCode: 2001
