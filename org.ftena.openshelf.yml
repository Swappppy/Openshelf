License: GPL-3.0-only
SourceCode: https://github.com/Swappppy/Openshelf
IssueTracker: https://github.com/Swappppy/Openshelf/issues
Translation: https://hosted.weblate.org/projects/openshelf/

Summary: Personal library manager and book tracker (FOSS)
Description: |-
  Openshelf is a free, open-source personal library manager.
  It works as a comprehensive reading tracker and book archiving tool.
  Everything stays on your device: no account required and no data leaves your phone.
  
  Features:
  * Dynamic views (List/Grid).
  * Trackable reading status.
  * Powerful search and advanced filtering.
  * Category, publisher, and collection management.
  * Hybrid scanner (Barcode and ISBN via OCR).
  * Detailed statistics and customizable widgets.

RepoType: git
Repo: https://github.com/Swappppy/Openshelf

Builds:
  - versionName: 1.0.0
    versionCode: 1
    commit: v1.0.2
    subdir: .
    srclibs:
      - flutter@stable
    prebuild:
      - $$flutter$$ pub get
    build:
      - $$flutter$$ build apk --release --target-platform android-arm64
    output: build/app/outputs/flutter-apk/app-release.apk

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags
